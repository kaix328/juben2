<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>生成图标</title>
</head>
<body>
    <h1>正在生成图标...</h1>
    <canvas id="canvas192" width="192" height="192" style="display:none;"></canvas>
    <canvas id="canvas512" width="512" height="512" style="display:none;"></canvas>
    <div id="status"></div>
    <div id="downloads"></div>

    <script>
        function generateIcon(size) {
            const canvas = document.getElementById(`canvas${size}`);
            const ctx = canvas.getContext('2d');
            
            // 背景
            ctx.fillStyle = '#6366f1';
            ctx.fillRect(0, 0, size, size);
            
            // 圆角
            ctx.globalCompositeOperation = 'destination-in';
            ctx.beginPath();
            const radius = size * 0.25;
            ctx.moveTo(radius, 0);
            ctx.lineTo(size - radius, 0);
            ctx.quadraticCurveTo(size, 0, size, radius);
            ctx.lineTo(size, size - radius);
            ctx.quadraticCurveTo(size, size, size - radius, size);
            ctx.lineTo(radius, size);
            ctx.quadraticCurveTo(0, size, 0, size - radius);
            ctx.lineTo(0, radius);
            ctx.quadraticCurveTo(0, 0, radius, 0);
            ctx.closePath();
            ctx.fill();
            
            ctx.globalCompositeOperation = 'source-over';
            
            // 纸张图标
            const scale = size / 512;
            const paperWidth = 216 * scale;
            const paperHeight = 280 * scale;
            const paperX = (size - paperWidth) / 2;
            const paperY = (size - paperHeight) / 2;
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            ctx.fillRect(paperX, paperY, paperWidth, paperHeight);
            
            // 文字线条
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 8 * scale;
            ctx.lineCap = 'round';
            
            const lineY1 = paperY + 40 * scale;
            const lineY2 = paperY + 80 * scale;
            const lineY3 = paperY + 120 * scale;
            const lineY4 = paperY + 150 * scale;
            
            ctx.beginPath();
            ctx.moveTo(paperX + 30 * scale, lineY1);
            ctx.lineTo(paperX + paperWidth - 30 * scale, lineY1);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(paperX + 30 * scale, lineY2);
            ctx.lineTo(paperX + paperWidth - 60 * scale, lineY2);
            ctx.stroke();
            
            ctx.lineWidth = 6 * scale;
            ctx.globalAlpha = 0.6;
            
            ctx.beginPath();
            ctx.moveTo(paperX + 30 * scale, lineY3);
            ctx.lineTo(paperX + paperWidth - 30 * scale, lineY3);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.moveTo(paperX + 30 * scale, lineY4);
            ctx.lineTo(paperX + paperWidth - 90 * scale, lineY4);
            ctx.stroke();
            
            ctx.globalAlpha = 1;
            
            // 分镜框
            ctx.strokeStyle = '#6366f1';
            ctx.lineWidth = 6 * scale;
            ctx.fillStyle = 'transparent';
            
            const frameSize = 70 * scale;
            const frameY = paperY + 180 * scale;
            
            ctx.strokeRect(paperX + 30 * scale, frameY, frameSize, frameSize);
            ctx.strokeRect(paperX + 116 * scale, frameY, frameSize, frameSize);
            
            // 星星装饰
            ctx.fillStyle = '#fbbf24';
            const starX = paperX + paperWidth - 20 * scale;
            const starY = paperY + 20 * scale;
            const starSize = 12 * scale;
            
            ctx.beginPath();
            ctx.arc(starX, starY, starSize, 0, Math.PI * 2);
            ctx.fill();
            
            return canvas.toDataURL('image/png');
        }

        // 生成并下载图标
        const icon192 = generateIcon(192);
        const icon512 = generateIcon(512);
        
        const downloads = document.getElementById('downloads');
        
        // 创建下载链接
        const link192 = document.createElement('a');
        link192.href = icon192;
        link192.download = 'icon-192.png';
        link192.textContent = '下载 icon-192.png';
        link192.style.display = 'block';
        link192.style.margin = '10px';
        downloads.appendChild(link192);
        
        const link512 = document.createElement('a');
        link512.href = icon512;
        link512.download = 'icon-512.png';
        link512.textContent = '下载 icon-512.png';
        link512.style.display = 'block';
        link512.style.margin = '10px';
        downloads.appendChild(link512);
        
        const linkApple = document.createElement('a');
        linkApple.href = icon192;
        linkApple.download = 'apple-touch-icon.png';
        linkApple.textContent = '下载 apple-touch-icon.png';
        linkApple.style.display = 'block';
        linkApple.style.margin = '10px';
        downloads.appendChild(linkApple);
        
        document.getElementById('status').innerHTML = '<p style="color: green;">✅ 图标生成成功！请点击下面的链接下载，然后将文件放到 public 文件夹中。</p>';
        
        // 自动触发下载
        setTimeout(() => {
            link192.click();
            setTimeout(() => {
                link512.click();
                setTimeout(() => {
                    linkApple.click();
                }, 500);
            }, 500);
        }, 500);
    </script>
</body>
</html>
